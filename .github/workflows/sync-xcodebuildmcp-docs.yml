name: Sync XcodeBuildMCP manifests

on:
  schedule:
    # Every Monday at 09:00 UTC — catches releases published the previous week.
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      ref:
        description: "Optional ref/tag to sync (defaults to latest release)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-xcodebuildmcp-docs
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync manifests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_REF: ${{ inputs.ref }}
        run: |
          if [ -n "$INPUT_REF" ]; then
            pnpm run docs:sync -- --ref="$INPUT_REF"
          else
            pnpm run docs:sync
          fi

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet app/docs/_data/generated/manifests.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to manifests."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            version=$(node -p "require('./app/docs/_data/generated/manifests.json').version")
            ref=$(node -p "require('./app/docs/_data/generated/manifests.json').ref")
            tools=$(node -p "require('./app/docs/_data/generated/manifests.json').tools.length")
            workflows=$(node -p "require('./app/docs/_data/generated/manifests.json').workflows.length")
            {
              echo "version=$version"
              echo "ref=$ref"
              echo "tools=$tools"
              echo "workflows=$workflows"
            } >> "$GITHUB_OUTPUT"
            echo "Detected drift: $ref ($tools tools, $workflows workflows)."
          fi

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/sync-xcodebuildmcp-${{ steps.diff.outputs.ref }}
          base: main
          commit-message: |
            chore(docs): sync XcodeBuildMCP manifests to ${{ steps.diff.outputs.ref }}
          title: "chore(docs): sync XcodeBuildMCP manifests to ${{ steps.diff.outputs.ref }}"
          body: |
            Automated sync from [getsentry/XcodeBuildMCP](https://github.com/getsentry/XcodeBuildMCP) `${{ steps.diff.outputs.ref }}`.

            - Version: `${{ steps.diff.outputs.version }}`
            - Tools: **${{ steps.diff.outputs.tools }}**
            - Workflows: **${{ steps.diff.outputs.workflows }}**

            Generated by `.github/workflows/sync-xcodebuildmcp-docs.yml`. Review the diff in `app/docs/_data/generated/manifests.json`, then merge to refresh the live docs.
          labels: |
            docs
            automated
          add-paths: |
            app/docs/_data/generated/manifests.json
          delete-branch: true
